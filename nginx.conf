# nginx 配置:托管 MDInline 静态导出(out/)。
# - gzip 压缩文本资源
# - /_next/static/ 带内容哈希,长期不可变缓存
# - 其余路径 SPA 式兜底(trailingSlash:true 时目录直接命中 index.html)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 哈希化的静态资源 —— 永久缓存
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 其余:按 uri → uri/(目录)→ uri.html → index.html 顺序兜底
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
